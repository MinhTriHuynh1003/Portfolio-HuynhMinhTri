<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" width="100%" height="100%">
  <defs>
    <filter id="drop-shadow">
      <feDropShadow dx="8" dy="8" stdDeviation="0" flood-color="#000" flood-opacity="1"/>
    </filter>
  </defs>

  <!-- White sticker border and shadow -->
  <path d="M 10 240 A 230 230 0 0 1 490 240 L 490 250 L 10 250 Z" fill="#fff" filter="url(#drop-shadow)"/>
  
  <!-- Red Arc -->
  <path d="M 30 240 A 210 210 0 0 1 470 240 L 440 240 A 180 180 0 0 0 60 240 Z" fill="#FF0000" stroke="#000" stroke-width="4"/>
  <!-- Orange Arc -->
  <path d="M 60 240 A 180 180 0 0 1 440 240 L 410 240 A 150 150 0 0 0 90 240 Z" fill="#FF7F00" stroke="#000" stroke-width="4"/>
  <!-- Yellow Arc -->
  <path d="M 90 240 A 150 150 0 0 1 410 240 L 380 240 A 120 120 0 0 0 120 240 Z" fill="#FFFF00" stroke="#000" stroke-width="4"/>
  <!-- Green Arc -->
  <path d="M 120 240 A 120 120 0 0 1 380 240 L 350 240 A 90 90 0 0 0 150 240 Z" fill="#00FF00" stroke="#000" stroke-width="4"/>
  <!-- Blue Arc -->
  <path d="M 150 240 A 90 90 0 0 1 350 240 L 320 240 A 60 60 0 0 0 180 240 Z" fill="#0000FF" stroke="#000" stroke-width="4"/>
  <!-- Indigo Arc -->
  <path d="M 180 240 A 60 60 0 0 1 320 240 L 290 240 A 30 30 0 0 0 210 240 Z" fill="#4B0082" stroke="#000" stroke-width="4"/>
  <!-- Violet Arc (center) -->
  <path d="M 210 240 A 30 30 0 0 1 290 240 Z" fill="#9400D3" stroke="#000" stroke-width="4"/>

  <!-- Clouds -->
  <path d="M 10 240 Q 10 210 40 210 Q 60 180 90 210 Q 120 210 120 240 Z" fill="#fff" stroke="#000" stroke-width="5"/>
  <path d="M 380 240 Q 380 210 410 210 Q 430 180 460 210 Q 490 210 490 240 Z" fill="#fff" stroke="#000" stroke-width="5"/>

</svg>
